[pytest]
testpaths = tests
pythonpath = src
markers =
    slow: expensive model-training, tuning, or deep smoke checks; run in full regression
    integration: checks that depend on external/local data or cross-component runtime layout
    experimental: retained checks for non-promoted or research feature families
filterwarnings =
    ignore:Level value of .* is too high:UserWarning:pywt\._multilevel
