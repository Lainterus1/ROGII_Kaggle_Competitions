run:
  name: baseline_lgbm
  type: model_baseline
  seed: 42
  environment: local

paths:
  config: configs/paths.local.yaml.example

model:
  type: lightgbm
  params:
    objective: regression
    learning_rate: 0.05
    n_estimators: 1000
    random_state: 42

features:
  set_name: with_tvt_input
  columns: [MD, X, Y, Z, GR, GR_is_missing, MD_delta, MD_relative, row_position, last_tvt_input]
  include_tvt_input: true

validation:
  strategy: group_kfold
  n_splits: 5
  group_column: well_id
