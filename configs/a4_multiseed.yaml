run:
  name: a4_multiseed_lgbm
  type: model_baseline
  seed: 42
  seed_list: [42, 7, 123]
  environment: local

paths:
  config: configs/paths.local.yaml.example

model:
  type: lightgbm
  params:
    objective: regression
    learning_rate: 0.0664
    num_leaves: 48
    min_child_samples: 60
    subsample: 0.7164
    colsample_bytree: 0.7328
    reg_alpha: 0.001539
    reg_lambda: 0.0004334
    min_child_weight: 0.009634
  early_stopping_rounds: 50

features:
  set_name: r1_optimized
  columns:
    - MD
    - X
    - Y
    - Z
    - GR
    - MD_relative
    - md_since_ps
    - frac_after_ps
    - dx_since_ps
    - dy_since_ps
    - dz_since_ps
    - dxy_since_ps
    - dxdmd
    - dydmd
    - dzdmd
    - gr_roll_mean_101
    - gr_roll_std_101
    - gr_energy
  include_tvt_input: false
  include_geometry: true
  include_gr: true
  include_gr_dwt: false
  include_typewell: false
  include_spatial: false
  include_dtw: false
  include_geology: false
  residual_target: true

validation:
  strategy: group
  n_splits: 5
  group_column: well_id

artifacts:
  model_path: models/a4_multiseed.pkl
  submission_path: outputs/submission.csv
