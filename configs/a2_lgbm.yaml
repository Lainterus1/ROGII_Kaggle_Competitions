run:
  name: a2_lgbm_dwt_spatial
  type: model_baseline
  seed: 42
  environment: local

paths:
  config: configs/paths.local.yaml.example

model:
  type: lightgbm
  params:
    objective: regression
    learning_rate: 0.05
    n_estimators: 1000

features:
  set_name: a2_dwt_spatial
  columns:
    - MD
    - X
    - Y
    - Z
    - GR
    - MD_relative
    - md_since_ps
    - frac_after_ps
    - dx_since_ps
    - dy_since_ps
    - dz_since_ps
    - dxy_since_ps
    - dxdmd
    - dydmd
    - dzdmd
    - gr_roll_mean_101
    - gr_roll_std_101
    - gr_energy
  include_tvt_input: false
  include_geometry: true
  include_gr: true
  include_gr_dwt: true
  include_typewell: false
  include_spatial: true
  residual_target: true

validation:
  strategy: group_kfold
  n_splits: 5
  group_column: well_id

artifacts:
  model_path: models/a2_lgbm.pkl
  submission_path: outputs/submission.csv
