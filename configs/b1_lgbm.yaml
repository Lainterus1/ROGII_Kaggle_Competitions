run:
  name: b1_lgbm_beam
  type: model_baseline
  seed: 42
  environment: local

paths:
  config: configs/paths.local.yaml.example

model:
  type: lightgbm
  params:
    objective: regression
    learning_rate: 0.03
    n_estimators: 5000
    num_leaves: 127
    min_child_samples: 15
    subsample: 0.75
    subsample_freq: 1
    colsample_bytree: 0.75
    reg_lambda: 3.0
    reg_alpha: 0.05

features:
  set_name: b1_beam
  columns:
    - MD
    - X
    - Y
    - Z
    - GR
    - MD_relative
    - md_since_ps
    - frac_after_ps
    - dx_since_ps
    - dy_since_ps
    - dz_since_ps
    - dxy_since_ps
    - dxdmd
    - dydmd
    - dzdmd
    - gr_roll_mean_101
    - gr_roll_std_101
    - gr_energy
    - gr_dwt_approx
    - gr_dwt_detail_energy
  include_tvt_input: false
  include_geometry: true
  include_gr: true
  include_gr_dwt: true
  include_beam: true
  include_typewell: false
  include_spatial: false
  include_dtw: false
  include_geology: false
  residual_target: true

validation:
  strategy: group_kfold
  n_splits: 5
  group_column: well_id

artifacts:
  model_path: models/b1_lgbm.pkl
  submission_path: outputs/submission.csv
