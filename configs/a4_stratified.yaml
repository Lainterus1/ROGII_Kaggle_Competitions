run:
  name: a4_stratified_lgbm
  type: model_baseline
  seed: 42
  seed_list: [42]
  environment: local

paths:
  config: configs/paths.local.yaml.example

model:
  type: lightgbm
  params:
    objective: regression
    learning_rate: 0.05
    n_estimators: 1000

features:
  set_name: r1_optimized
  columns:
    - MD
    - X
    - Y
    - Z
    - GR
    - MD_relative
    - md_since_ps
    - frac_after_ps
    - dx_since_ps
    - dy_since_ps
    - dz_since_ps
    - dxy_since_ps
    - dxdmd
    - dydmd
    - dzdmd
    - gr_roll_mean_101
    - gr_roll_std_101
    - gr_energy
  include_tvt_input: false
  include_geometry: true
  include_gr: true
  include_gr_dwt: false
  include_typewell: false
  include_spatial: false
  include_dtw: false
  include_geology: false
  residual_target: true

validation:
  strategy: stratified
  n_splits: 5
  group_column: well_id
  strat_tvt_bins: 4
  strat_spatial_clusters: 5

artifacts:
  model_path: models/a4_stratified.pkl
  submission_path: outputs/submission.csv
