run:
  name: b3_lgbm_fplane
  type: model_baseline
  seed: 42
  environment: local

paths:
  config: configs/paths.local.yaml.example

model:
  type: lightgbm
  params:
    objective: regression
    learning_rate: 0.03
    n_estimators: 5000
    num_leaves: 127
    min_child_samples: 15
    subsample: 0.75
    subsample_freq: 1
    colsample_bytree: 0.75
    reg_lambda: 3.0
    reg_alpha: 0.05

features:
  set_name: b3_fplane
  include_tvt_input: false
  include_geometry: true
  include_gr: true
  include_gr_dwt: false
  include_beam: false
  include_formation_plane: true
  include_typewell: false
  include_spatial: false
  include_dtw: false
  include_geology: false
  residual_target: true
  baseline_method: flat

validation:
  strategy: group_kfold
  n_splits: 5
  group_column: well_id

artifacts:
  model_path: models/b3_lgbm.pkl
  submission_path: outputs/submission.csv
